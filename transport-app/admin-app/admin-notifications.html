<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - View Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0b0d14; color: #e2e8f0; padding: 40px; }
    .card { background: #0f1119; padding: 24px; border: 1px solid #1e2130; border-radius: 12px; max-width: 600px; margin: 0 auto;}
    h1 { font-size: 20px; font-weight: 700; color: #10b981; margin-bottom: 20px; text-transform: uppercase; }
    label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; color: #64748b; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #1e2130; background: #0d0f18; color: #fff; outline:none; box-sizing: border-box; }
    input:focus { border-color: #10b981; }
    button { width: 100%; background: #10b981; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: background 0.2s;}
    button:hover { background: #059669; }
    
    .notification-list { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
    .notif-item { background: #13151f; border-left: 4px solid #10b981; padding: 18px; border-radius: 8px; }
    .notif-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #fff; }
    .notif-msg { font-size: 14px; color: #94a3b8; margin-bottom: 10px; line-height: 1.5; }
    .notif-date { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; }
    
    #message-box { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
    .error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  </style>
</head>
<body>

<div class="card">
  <h1>🛡️ Admin - View Updates</h1>
  
  <label>Admin JWT Token:</label>
  <input type="text" id="jwtToken" placeholder="Paste Admin JWT token here">

  <button onclick="fetchUpdates()">📥 Load Notifications</button>

  <div id="message-box"></div>

  <div class="notification-list" id="notifList">
    <!-- Notifications will appear here -->
  </div>
</div>

<script>
async function fetchUpdates() {
  const token = document.getElementById('jwtToken').value;
  const msgBox = document.getElementById('message-box');
  const list = document.getElementById('notifList');
  
  if (!token) {
    msgBox.className = 'error';
    msgBox.textContent = 'Please provide JWT Token';
    msgBox.style.display = 'block';
    return;
  }

  msgBox.style.display = 'none';
  list.innerHTML = '<p style="color: #64748b; text-align: center;">Loading...</p>';

  try {
    const res = await fetch('http://localhost:4000/api/notifications', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    const data = await res.json();

    if (res.ok) {
      if(data.length === 0) {
          list.innerHTML = '<p style="color: #64748b; text-align: center;">No new notifications</p>';
          return;
      }
      list.innerHTML = data.map(n => `
        <div class="notif-item">
          <div class="notif-title">${n.title}</div>
          <div class="notif-msg">${n.message}</div>
          <div class="notif-date">📅 ${new Date(n.created_at).toLocaleString()}</div>
        </div>
      `).join('');
    } else {
      list.innerHTML = '';
      msgBox.className = 'error';
      msgBox.textContent = `Error: ${data.error || 'Failed to fetch'}`;
      msgBox.style.display = 'block';
    }
  } catch(e) {
    list.innerHTML = '';
    msgBox.className = 'error';
    msgBox.textContent = `Connection error: ${e.message}`;
    msgBox.style.display = 'block';
  }
}
</script>

</body>
</html>
