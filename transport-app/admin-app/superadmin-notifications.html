<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Super Admin Panel - Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0b0d14; color: #e2e8f0; padding: 40px; }
    .card { background: #0f1119; padding: 24px; border: 1px solid #1e2130; border-radius: 12px; max-width: 500px; margin: 0 auto;}
    h1 { font-size: 20px; font-weight: 700; color: #7c3aed; margin-bottom: 20px; text-transform: uppercase; }
    label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; color: #64748b; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #1e2130; background: #0d0f18; color: #fff; outline:none; box-sizing: border-box; }
    input:focus, textarea:focus { border-color: #7c3aed; }
    button { width: 100%; background: #7c3aed; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: background 0.2s;}
    button:hover { background: #6d28d9; }
    #message-box { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
    .success { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  </style>
</head>
<body>

<div class="card">
  <h1>👑 Super Admin - Send Update</h1>
  
  <label>Super Admin JWT Token:</label>
  <input type="text" id="jwtToken" placeholder="Paste Super Admin JWT token here">

  <label>Title:</label>
  <input type="text" id="title" placeholder="App Update">

  <label>Message:</label>
  <textarea id="message" rows="4" placeholder="New feature added"></textarea>

  <button onclick="sendUpdate()">🚀 Send Notification</button>

  <div id="message-box"></div>
</div>

<script>
async function sendUpdate() {
  const token = document.getElementById('jwtToken').value;
  const title = document.getElementById('title').value;
  const message = document.getElementById('message').value;
  const msgBox = document.getElementById('message-box');
  
  if (!token || !title || !message) {
    msgBox.className = 'error';
    msgBox.textContent = 'Please fill all fields';
    msgBox.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('http://localhost:4000/api/notifications', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ title, message })
    });

    const data = await res.json();
    msgBox.style.display = 'block';

    if (res.ok) {
      msgBox.className = 'success';
      msgBox.textContent = data.message || 'Notification sent!';
      document.getElementById('title').value = '';
      document.getElementById('message').value = '';
    } else {
      msgBox.className = 'error';
      msgBox.textContent = `Error: ${data.error || 'Failed to send'}`;
    }
  } catch(e) {
    msgBox.className = 'error';
    msgBox.textContent = `Connection error: ${e.message}`;
    msgBox.style.display = 'block';
  }
}
</script>

</body>
</html>
