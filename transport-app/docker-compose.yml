version: '3.8'
services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: transport
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
  api:
    build: ./server
    depends_on:
      - mysql
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=example
      - MYSQL_DATABASE=transport
      - JWT_SECRET=dev_secret_change_me
    ports:
      - '3000:3000'
    volumes:
      - ./server:/usr/src/app
volumes:
  mysql-data:
