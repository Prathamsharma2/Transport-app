<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHILLON ROADLINES - Auth Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">
  <div class="auth-card glass">
    <div class="logo-container">
      <!-- Shield Icon SVG -->
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
    </div>

    <!-- Login Area -->
    <div id="loginArea">
      <h1 class="gradient-text" style="font-size:32px; font-weight:800; letter-spacing:-1px;">DHILLON ROADLINES</h1>
      <p class="subtitle" style="margin-top:8px;">Sign in to your professional fleet dashboard</p>

      <form id="loginForm" style="margin-top:32px;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group" style="margin-bottom:32px;">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; height:50px;">Sign In Now</button>
      </form>
      
      <div class="auth-footer" style="margin-top:32px;">
        Don't have an account? <a id="showRegister">Create Account</a>
      </div>
    </div>

    <!-- Register Area -->
    <div id="registerArea" style="display: none;">
      <h1 class="gradient-text" style="font-size:28px; font-weight:800;">Join DHILLON ROADLINES</h1>
      <p class="subtitle">Set up your portal access</p>

      <div id="bootstrapMessage" class="alert alert-success" style="margin-bottom: 20px; display: none;">
        Welcome! Create the first Admin account to get started.
      </div>

      <form id="registerForm" style="margin-top:24px;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="Pick a username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Minimum 6 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="regConfirmPassword" placeholder="Repeat your password" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; height:50px;">Create Account</button>
      </form>
      
      <div class="auth-footer" style="margin-top:24px;">
        Already have an account? <a id="showLogin">Sign In</a>
      </div>
    </div>

    <div id="authAlert" class="alert"></div>
  </div>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
